name: Run FPI Archive Scraper

on:
  schedule:
    - cron: '0 0 1 * *'
  workflow_dispatch:
    inputs:
      start_year:
        description: 'Start year (inclusive)'
        default: '2012'
      end_year:
        description: 'End year (inclusive)'
        default: '2025'
      use_last_day:
        description: 'Use last day of month for full‑month totals?'
        type: choice
        options:
          - 'True'
          - 'False'
        default: 'True'

jobs:
  # First, calculate the number of months and create dynamic chunks
  calculate-chunks:
    runs-on: ubuntu-latest
    outputs:
      chunks: ${{ steps.chunks.outputs.matrix }}
    steps:
      - name: Calculate chunk matrix
        id: chunks
        run: |
          START_YEAR=${{ github.event.inputs.start_year || '2012' }}
          END_YEAR=${{ github.event.inputs.end_year || '2025' }}
          
          # Calculate total months
          TOTAL_MONTHS=$(( (END_YEAR - START_YEAR + 1) * 12 ))
          
          # Determine optimal number of chunks (max 4, min 1)
          if [ $TOTAL_MONTHS -le 12 ]; then
            CHUNKS=1
          elif [ $TOTAL_MONTHS -le 48 ]; then
            CHUNKS=2
          elif [ $TOTAL_MONTHS -le 96 ]; then
            CHUNKS=3
          else
            CHUNKS=4
          fi
          
          CHUNK_SIZE=$(( TOTAL_MONTHS / CHUNKS ))
          
          # Generate matrix JSON
          echo "Total months: $TOTAL_MONTHS"
          echo "Chunks: $CHUNKS"
          echo "Chunk size: $CHUNK_SIZE"
          
          MATRIX="{\"include\":["
          for i in $(seq 0 $((CHUNKS - 1))); do
            START=$(( i * CHUNK_SIZE ))
            if [ $i -eq $((CHUNKS - 1)) ]; then
              END=$TOTAL_MONTHS
            else
              END=$(( (i + 1) * CHUNK_SIZE ))
            fi
            if [ $i -gt 0 ]; then
              MATRIX+=","
            fi
            MATRIX+="{\"start\":$START,\"end\":$END}"
          done
          MATRIX+="]}"
          
          echo "matrix=$MATRIX" >> $GITHUB_OUTPUT

  scrape:
    needs: calculate-chunks
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.calculate-chunks.outputs.chunks) }}

    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Chrome
        uses: browser-actions/setup-chrome@v2
        id: setup-chrome
        with:
          chrome-version: '149'
          install-chromedriver: true

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install selenium webdriver-manager

      - name: Run Scraper
        env:
          CHROME_PATH: ${{ steps.setup-chrome.outputs.chrome-path }}
          CHROMEDRIVER_PATH: ${{ steps.setup-chrome.outputs.chromedriver-path }}
        run: |
          python fpi_scrapper.py \
            --start-year ${{ github.event.inputs.start_year || '2012' }} \
            --end-year ${{ github.event.inputs.end_year || '2025' }} \
            --use-last-day ${{ github.event.inputs.use_last_day || 'True' }} \
            --start ${{ matrix.start }} \
            --end ${{ matrix.end }}

      - name: Upload DB chunk
        uses: actions/upload-artifact@v4
        with:
          name: fpi-db-${{ matrix.start }}-${{ matrix.end }}
          path: "*.db"
  merge:
    needs: scrape
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Download all DB chunks
        uses: actions/download-artifact@v4
        with:
          path: dbs/

      - name: List downloaded files
        run: |
          echo "Downloaded files:"
          find dbs/ -type f -name "*.db" || echo "No DB files found"

      - name: Merge DBs
        run: |
          python merge_fpi_dbs.py \
            ${{ github.event.inputs.start_year || '2012' }} \
            ${{ github.event.inputs.end_year || '2025' }}

      - name: List output files
        run: |
          echo "Files after merge:"
          ls -la *.db 2>/dev/null || echo "No .db files in root"
          ls -la dbs/ 2>/dev/null || echo "No dbs folder"

      - name: Commit and push final DB
        run: |
          git config --global user.name "GitHub Actions Bot"
          git config --global user.email "actions@github.com"
          
          # Remove the dbs folder (we don't want to commit chunks)
          rm -rf dbs/
          
          # Stage the final DB
          git add fpi_data_*_FINAL_*.db
          
          # Check if anything was staged
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Auto-updated FPI monthly data [skip ci]"
            git push
          fi