name: Run FPI Archive Scraper

on:
  schedule:
    - cron: '0 0 1 * *'
  workflow_dispatch:
    inputs:
      start_year:
        description: 'Start year (inclusive)'
        default: '2012'
      end_year:
        description: 'End year (inclusive)'
        default: '2025'

jobs:
  calculate-chunks:
    runs-on: ubuntu-latest
    outputs:
      chunks: ${{ steps.chunks.outputs.matrix }}
      start_year: ${{ steps.vars.outputs.start_year }}
      end_year: ${{ steps.vars.outputs.end_year }}
    steps:
      - name: Set variables
        id: vars
        run: |
          START_YEAR="${{ github.event.inputs.start_year || '2012' }}"
          END_YEAR="${{ github.event.inputs.end_year || '2025' }}"
          echo "start_year=$START_YEAR" >> $GITHUB_OUTPUT
          echo "end_year=$END_YEAR" >> $GITHUB_OUTPUT
          echo "Start year: $START_YEAR"
          echo "End year: $END_YEAR"

      - name: Calculate chunk matrix
        id: chunks
        run: |
          START_YEAR="${{ steps.vars.outputs.start_year }}"
          END_YEAR="${{ steps.vars.outputs.end_year }}"
          
          TOTAL_MONTHS=$(( (END_YEAR - START_YEAR + 1) * 12 ))
          
          if [ $TOTAL_MONTHS -le 12 ]; then
            CHUNKS=1
          elif [ $TOTAL_MONTHS -le 48 ]; then
            CHUNKS=2
          elif [ $TOTAL_MONTHS -le 96 ]; then
            CHUNKS=3
          else
            CHUNKS=4
          fi
          
          MONTHS_PER_CHUNK=$(( TOTAL_MONTHS / CHUNKS ))
          REMAINDER=$(( TOTAL_MONTHS % CHUNKS ))
          
          echo "Total months: $TOTAL_MONTHS, Chunks: $CHUNKS, Months/chunk: $MONTHS_PER_CHUNK, Remainder: $REMAINDER"
          
          MATRIX="{\"include\":["
          CURRENT_START=0
          
          for i in $(seq 0 $((CHUNKS - 1))); do
            if [ $i -lt $REMAINDER ]; then
              CHUNK_SIZE=$(( MONTHS_PER_CHUNK + 1 ))
            else
              CHUNK_SIZE=$MONTHS_PER_CHUNK
            fi
            
            CURRENT_END=$(( CURRENT_START + CHUNK_SIZE ))
            
            echo "  Chunk $((i+1)): start=$CURRENT_START, end=$CURRENT_END, size=$CHUNK_SIZE"
            
            if [ $i -gt 0 ]; then
              MATRIX+=","
            fi
            MATRIX+="{\"start\":$CURRENT_START,\"end\":$CURRENT_END}"
            
            CURRENT_START=$CURRENT_END
          done
          MATRIX+="]}"
          
          echo "matrix=$MATRIX" >> $GITHUB_OUTPUT
          echo "Final matrix: $MATRIX"

  scrape:
    needs: calculate-chunks
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.calculate-chunks.outputs.chunks) }}

    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Chrome
        uses: browser-actions/setup-chrome@v2
        id: setup-chrome
        with:
          chrome-version: '149'
          install-chromedriver: true

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install selenium webdriver-manager

      - name: Run Scraper
        env:
          CHROME_PATH: ${{ steps.setup-chrome.outputs.chrome-path }}
          CHROMEDRIVER_PATH: ${{ steps.setup-chrome.outputs.chromedriver-path }}
        run: |
          python fpi_scrapper.py \
            --start-year ${{ needs.calculate-chunks.outputs.start_year }} \
            --end-year ${{ needs.calculate-chunks.outputs.end_year }} \
            --start ${{ matrix.start }} \
            --end ${{ matrix.end }}

      - name: Upload DB chunk
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: fpi-db-chunk-${{ matrix.start }}-${{ matrix.end }}
          path: "fpi_data_*.db"
          retention-days: 7

  merge:
    needs: 
      - scrape
      - calculate-chunks
    if: always() && !cancelled()
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Set year variables
        id: years
        run: |
          echo "start_year=${{ needs.calculate-chunks.outputs.start_year }}" >> $GITHUB_OUTPUT
          echo "end_year=${{ needs.calculate-chunks.outputs.end_year }}" >> $GITHUB_OUTPUT
          echo "Years: ${{ needs.calculate-chunks.outputs.start_year }} - ${{ needs.calculate-chunks.outputs.end_year }}"

      - name: Download all DB chunks
        uses: actions/download-artifact@v4
        with:
          path: dbs/
          pattern: fpi-db-chunk-*
          merge-multiple: false

      - name: List downloaded artifacts
        run: |
          echo "Downloaded files:"
          find dbs/ -type f -name "*.db" | sort

      - name: Merge DBs
        run: |
          python merge_fpi_dbs.py ${{ steps.years.outputs.start_year }} ${{ steps.years.outputs.end_year }}

      - name: Show final output
        run: |
          echo "All .db files in workspace:"
          find . -name "*.db" -type f -ls

      - name: Upload final DB as artifact
        uses: actions/upload-artifact@v4
        with:
          name: fpi-final-database
          path: "**/*FINAL*.db"
          retention-days: 90

      - name: Commit and push final DB
        run: |
          git config --global user.name "GitHub Actions Bot"
          git config --global user.email "actions@github.com"
          
          FINAL_DB=$(find . -maxdepth 1 -name "*FINAL*.db" -type f | head -1)
          
          if [ -n "$FINAL_DB" ]; then
            echo "Found final DB: $FINAL_DB"
            git add "$FINAL_DB"
            git commit -m "Auto-updated FPI daily data [skip ci]" || echo "No changes to commit"
            git push
          else
            echo "No FINAL DB found in current directory"
            echo "Searching everywhere..."
            find . -name "*.db" -type f
          fi