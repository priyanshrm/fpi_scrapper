name: Run FPI Archive Scraper

on:
  schedule:
    # Run on the 1st of every month at 00:00 UTC
    - cron: '0 0 1 * *'
  workflow_dispatch:
    inputs:
      start_year:
        description: 'Start year (inclusive)'
        default: '2012'
      end_year:
        description: 'End year (inclusive)'
        default: '2025'
      use_last_day:
        description: 'Use last day of month? (True = last day, False = 1st day)'
        type: choice
        options:
          - 'True'
          - 'False'
        default: 'True'

jobs:
  calculate-chunks:
    runs-on: ubuntu-latest
    outputs:
      chunks: ${{ steps.chunks.outputs.matrix }}
      start_year: ${{ steps.vars.outputs.start_year }}
      end_year: ${{ steps.vars.outputs.end_year }}
      use_last_day: ${{ steps.vars.outputs.use_last_day }}
    steps:
      - name: Set variables
        id: vars
        run: |
          echo "start_year=${{ github.event.inputs.start_year || '2012' }}" >> $GITHUB_OUTPUT
          echo "end_year=${{ github.event.inputs.end_year || '2025' }}" >> $GITHUB_OUTPUT
          echo "use_last_day=${{ github.event.inputs.use_last_day || 'True' }}" >> $GITHUB_OUTPUT

      - name: Calculate chunk matrix
        id: chunks
        run: |
          START_YEAR=${{ steps.vars.outputs.start_year }}
          END_YEAR=${{ steps.vars.outputs.end_year }}
          
          # Calculate total months
          TOTAL_MONTHS=$(( (END_YEAR - START_YEAR + 1) * 12 ))
          
          # Determine number of chunks
          if [ $TOTAL_MONTHS -le 12 ]; then
            CHUNKS=1
          elif [ $TOTAL_MONTHS -le 48 ]; then
            CHUNKS=2
          elif [ $TOTAL_MONTHS -le 96 ]; then
            CHUNKS=3
          else
            CHUNKS=4
          fi
          
          CHUNK_SIZE=$(( TOTAL_MONTHS / CHUNKS ))
          
          echo "Total months: $TOTAL_MONTHS"
          echo "Chunks: $CHUNKS"
          echo "Chunk size: $CHUNK_SIZE"
          
          # Generate matrix JSON
          MATRIX="{\"include\":["
          for i in $(seq 0 $((CHUNKS - 1))); do
            START=$(( i * CHUNK_SIZE ))
            if [ $i -eq $((CHUNKS - 1)) ]; then
              END=$TOTAL_MONTHS
            else
              END=$(( (i + 1) * CHUNK_SIZE ))
            fi
            if [ $i -gt 0 ]; then
              MATRIX+=","
            fi
            MATRIX+="{\"start\":$START,\"end\":$END}"
          done
          MATRIX+="]}"
          
          echo "matrix=$MATRIX" >> $GITHUB_OUTPUT

  scrape:
    needs: calculate-chunks
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.calculate-chunks.outputs.chunks) }}

    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Chrome
        uses: browser-actions/setup-chrome@v2
        id: setup-chrome
        with:
          chrome-version: '149'
          install-chromedriver: true

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install selenium webdriver-manager

      - name: Run Scraper
        env:
          CHROME_PATH: ${{ steps.setup-chrome.outputs.chrome-path }}
          CHROMEDRIVER_PATH: ${{ steps.setup-chrome.outputs.chromedriver-path }}
        run: |
          python fpi_scrapper.py \
            --start-year ${{ needs.calculate-chunks.outputs.start_year }} \
            --end-year ${{ needs.calculate-chunks.outputs.end_year }} \
            --use-last-day ${{ needs.calculate-chunks.outputs.use_last_day }} \
            --start ${{ matrix.start }} \
            --end ${{ matrix.end }}

      - name: Upload DB chunk
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: fpi-db-${{ matrix.start }}-${{ matrix.end }}
          path: "*.db"
          retention-days: 7

  merge:
    needs: scrape
    if: always() && needs.scrape.result != 'skipped'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Download all DB chunks
        uses: actions/download-artifact@v4
        with:
          path: dbs/
          pattern: fpi-db-*
          merge-multiple: false

      - name: List downloaded artifacts
        run: |
          echo "Downloaded artifacts:"
          find dbs/ -name "*.db" -type f || echo "No DB files found"

      - name: Merge DBs
        run: |
          python merge_fpi_dbs.py \
            ${{ needs.calculate-chunks.outputs.start_year }} \
            ${{ needs.calculate-chunks.outputs.end_year }}

      - name: List output
        run: |
          echo "Final database:"
          ls -la *_FINAL_*.db 2>/dev/null || echo "No FINAL DB found"
          ls -la *.db 2>/dev/null || echo "No DB files found"

      - name: Upload final DB as artifact
        uses: actions/upload-artifact@v4
        with:
          name: fpi-final-db
          path: "*_FINAL_*.db"
          retention-days: 90

      - name: Commit and push final DB
        run: |
          git config --global user.name "GitHub Actions Bot"
          git config --global user.email "actions@github.com"
          
          # Check if final DB exists
          if ls *_FINAL_*.db 1> /dev/null 2>&1; then
            git add *_FINAL_*.db
            git commit -m "Auto-updated FPI daily data [skip ci]" || echo "No changes to commit"
            git push
          else
            echo "No FINAL DB to commit"
          fi