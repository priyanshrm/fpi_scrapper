name: Run FPI Archive Scraper

on:
  schedule:
    # Run on the 1st of every month at 00:00 UTC
    - cron: '0 0 1 * *'
  workflow_dispatch:
    inputs:
      start_year:
        description: 'Start year (inclusive)'
        default: '2012'
      end_year:
        description: 'End year (inclusive)'
        default: '2025'

jobs:
  calculate-chunks:
    runs-on: ubuntu-latest
    outputs:
      chunks: ${{ steps.chunks.outputs.matrix }}
      start_year: ${{ steps.vars.outputs.start_year }}
      end_year: ${{ steps.vars.outputs.end_year }}
    steps:
      - name: Set variables
        id: vars
        run: |
          echo "start_year=${{ github.event.inputs.start_year || '2012' }}" >> $GITHUB_OUTPUT
          echo "end_year=${{ github.event.inputs.end_year || '2025' }}" >> $GITHUB_OUTPUT

      - name: Calculate chunk matrix
        id: chunks
        run: |
          START_YEAR=${{ steps.vars.outputs.start_year }}
          END_YEAR=${{ steps.vars.outputs.end_year }}
          
          # Calculate total DAYS (approximate)
          YEARS=$(( END_YEAR - START_YEAR + 1 ))
          TOTAL_DAYS=$(( YEARS * 365 ))
          
          # Determine number of chunks based on total days
          if [ $TOTAL_DAYS -le 180 ]; then
            CHUNKS=1
          elif [ $TOTAL_DAYS -le 730 ]; then
            CHUNKS=2
          elif [ $TOTAL_DAYS -le 1800 ]; then
            CHUNKS=3
          else
            CHUNKS=4
          fi
          
          # Generate all dates and split into chunks
          DATES_PER_CHUNK=$(( TOTAL_DAYS / CHUNKS ))
          
          echo "Total days (approx): $TOTAL_DAYS"
          echo "Chunks: $CHUNKS"
          echo "Days per chunk: $DATES_PER_CHUNK"
          
          # Generate matrix JSON
          MATRIX="{\"include\":["
          for i in $(seq 0 $((CHUNKS - 1))); do
            START=$(( i * DATES_PER_CHUNK ))
            if [ $i -eq $((CHUNKS - 1)) ]; then
              END=99999  # Large number to capture all remaining
            else
              END=$(( (i + 1) * DATES_PER_CHUNK ))
            fi
            if [ $i -gt 0 ]; then
              MATRIX+=","
            fi
            MATRIX+="{\"start\":$START,\"end\":$END}"
          done
          MATRIX+="]}"
          
          echo "matrix=$MATRIX" >> $GITHUB_OUTPUT

  scrape:
    needs: calculate-chunks
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.calculate-chunks.outputs.chunks) }}

    runs-on: ubuntu-latest
    timeout-minutes: 360  # 6 hours max per chunk

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Chrome
        uses: browser-actions/setup-chrome@v2
        id: setup-chrome
        with:
          chrome-version: '149'
          install-chromedriver: true

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install selenium webdriver-manager

      - name: Run Scraper
        env:
          CHROME_PATH: ${{ steps.setup-chrome.outputs.chrome-path }}
          CHROMEDRIVER_PATH: ${{ steps.setup-chrome.outputs.chromedriver-path }}
        run: |
          python fpi_scrapper.py \
            --start-year ${{ needs.calculate-chunks.outputs.start_year }} \
            --end-year ${{ needs.calculate-chunks.outputs.end_year }} \
            --start ${{ matrix.start }} \
            --end ${{ matrix.end }}

      - name: Upload DB chunk
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: fpi-db-chunk-${{ matrix.start }}-${{ matrix.end }}
          path: "fpi_data_*.db"
          retention-days: 7

  merge:
    needs: scrape
    if: always() && !cancelled()
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Download all DB chunks
        uses: actions/download-artifact@v4
        with:
          path: dbs/
          pattern: fpi-db-chunk-*
          merge-multiple: false

      - name: List downloaded artifacts
        run: |
          echo "Downloaded files:"
          find dbs/ -type f -name "*.db" | sort

      - name: Merge DBs
        run: |
          python merge_fpi_dbs.py \
            ${{ needs.calculate-chunks.outputs.start_year }} \
            ${{ needs.calculate-chunks.outputs.end_year }}

      - name: Show final output
        run: |
          echo "Final database:"
          ls -lh *_FINAL_*.db 2>/dev/null || echo "No FINAL DB found"

      - name: Upload final DB as artifact
        uses: actions/upload-artifact@v4
        with:
          name: fpi-final-database
          path: "*_FINAL_*.db"
          retention-days: 90

      - name: Commit and push final DB
        run: |
          git config --global user.name "GitHub Actions Bot"
          git config --global user.email "actions@github.com"
          
          if ls *_FINAL_*.db 1> /dev/null 2>&1; then
            git add *_FINAL_*.db
            git commit -m "Auto-updated FPI daily data [skip ci]" || echo "No changes to commit"
            git push
          else
            echo "No FINAL DB to commit"
          fi