name: Run FPI Archive Scraper

on:
  schedule:
    - cron: '0 0 1 * *'
  workflow_dispatch:
    inputs:
      start_year:
        description: 'Start year (inclusive)'
        default: '2012'
      end_year:
        description: 'End year (inclusive)'
        default: '2025'
      use_last_day:
        description: 'Use last day of month for full‑month totals?'
        type: choice
        options:
          - 'True'
          - 'False'
        default: 'True'

jobs:
  scrape:
    strategy:
      fail-fast: false
      matrix:
        include:
          - start: 0
            end: 42
          - start: 42
            end: 84
          - start: 84
            end: 126
          - start: 126
            end: 168

    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Chrome
        uses: browser-actions/setup-chrome@v2
        id: setup-chrome
        with:
          chrome-version: '149'
          install-chromedriver: true

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install selenium webdriver-manager

      - name: Run Scraper
        env:
          CHROME_PATH: ${{ steps.setup-chrome.outputs.chrome-path }}
          CHROMEDRIVER_PATH: ${{ steps.setup-chrome.outputs.chromedriver-path }}
          START_YEAR: ${{ github.event.inputs.start_year || '2012' }}
          END_YEAR: ${{ github.event.inputs.end_year || '2025' }}
          USE_LAST_DAY: ${{ github.event.inputs.use_last_day || 'True' }}
        run: |
          python fpi_scrapper.py \
            --start-year $START_YEAR \
            --end-year $END_YEAR \
            --use-last-day $USE_LAST_DAY \
            --start ${{ matrix.start }} \
            --end ${{ matrix.end }}

      - name: Upload DB chunk
        uses: actions/upload-artifact@v4
        with:
          name: fpi-db-${{ matrix.start }}-${{ matrix.end }}
          path: "*.db"

  merge:
    needs: scrape
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Download all DB chunks
        uses: actions/download-artifact@v4
        with:
          path: dbs/

      - name: Merge DBs
        run: |
          python merge_fpi_dbs.py \
            ${{ github.event.inputs.start_year || '2012' }} \
            ${{ github.event.inputs.end_year || '2025' }}

      - name: Commit and push final DB
        run: |
          git config --global user.name "GitHub Actions Bot"
          git config --global user.email "actions@github.com"
          git add *_FINAL_*.db || echo "No DB generated"
          git commit -m "Auto-updated FPI monthly data [skip ci]" || exit 0
          git push